  <!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Escola Tríade | Inovação Audiovisual</title>
    <meta name="theme-color" content="#050505">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        /* --- RESET & BASE --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: #050505;
            color: #f0f0f0;
            font-family: 'Inter', system-ui, sans-serif;
            -webkit-font-smoothing: antialiased;
            padding-bottom: 80px; 
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header { margin-bottom: 40px; }

        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #ffffff 0%, #777777 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .subtitle { color: #666; font-size: 0.95rem; }

        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            background: #111;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            border: 1px solid #222;
            margin-bottom: 50px;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border: none;
        }

        .card-grid { display: flex; flex-direction: column; gap: 24px; }

        .card {
            display: grid;
            grid-template-columns: 260px 1fr;
            background: #0f0f0f;
            border: 1px solid #1f1f1f;
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .card:hover { border-color: #00ffb3; transform: translateY(-5px); }

        .card-img { width: 100%; height: 100%; overflow: hidden; }
        .card-img img { width: 100%; height: 100%; object-fit: cover; }

        .card-content { padding: 30px; display: flex; flex-direction: column; justify-content: center; }
        .card-content h2 { font-size: 1.5rem; color: #fff; margin-bottom: 10px; }
        .card-content p { font-size: 0.95rem; color: #888; margin-bottom: 24px; }

        .btn-action {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #00ffb3;
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
            border: 1px solid #00ffb3;
            padding: 12px 24px;
            border-radius: 8px;
            width: fit-content;
        }

        footer { text-align: center; padding-top: 60px; color: #444; font-size: 0.85rem; }

        @media (max-width: 768px) {
            .card { grid-template-columns: 1fr; grid-template-rows: 200px auto; }
            .btn-action { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Escola Tríade</h1>
            <p class="subtitle">Inovação Audiovisual e Mentorias</p>
        </header>

        <div class="video-wrapper">
            <iframe src="https://www.youtube.com/embed/VHMTkDUReKY" allowfullscreen></iframe>
        </div>

        <div class="card-grid">
            <div class="card js-link" data-tipo="curso" data-titulo="Agenda de IA">
                <div class="card-img">
                    <img src="https://images.unsplash.com/photo-1677442136019-21780ecad995?auto=format&fit=crop&w=800&q=80">
                </div>
                <div class="card-content">
                    <h2>Agenda de IA</h2>
                    <p>Início em 10/05. Acesso às salas individuais por aluno.</p>
                    <span class="btn-action">Acessar Agenda</span>
                </div>
            </div>

            <div class="card js-link" data-tipo="mentoria" data-titulo="Área de Mentoria">
                <div class="card-img">
                    <img src="https://cdn.pixabay.com/photo/2016/11/23/14/45/coding-1853305_1280.jpg">
                </div>
                <div class="card-content">
                    <h2>Mentoria</h2>
                    <p>Espaço reservado para acompanhamento individual.</p>
                    <span class="btn-action">Acessar Mentoria</span>
                </div>
            </div>
        </div>
        
        <footer>
            <p>Copyright Plínio Studio</p>
        </footer>
    </div>

    <script>
        document.querySelectorAll('.js-link').forEach(card => {
            card.addEventListener('click', () => {
                let senha = prompt("Insira a senha de acesso:");
                if (senha === "2031") {
                    abrirPlataforma(card.getAttribute('data-tipo'), card.getAttribute('data-titulo'));
                } else if (senha !== null) {
                    alert("Acesso negado.");
                }
            });
        });

        function abrirPlataforma(tipo, titulo) {
            const janela = window.open('', '_blank');
            
            // DADOS DO CURSO DE IA (COM DATAS NAS OBSERVAÇÕES)
            const alunosIA = [
                { nome: "Alexandre pé de serra", obs: "Segunda e Quarta-feira às 10:00h. Início 10/05." },
                { nome: "Wilma Duarte", obs: "Sexta-feira e Sábado às 20:00h. Início 10/05." },
                { nome: "Eli (mãe de Gael)", obs: "Sexta-feira e Sábado às 20:00h. Início 10/05." },
                { nome: "Maurina e Anikelly", obs: "Terça e Quinta-feira. Início 10/05." },
                { nome: "Scheila e Samantha", obs: "Terça e Quinta-feira. Início 10/05." },
                { nome: "Izabel e Sophia", obs: "Sábado às 20:00h e Domingo às 09:00h. Início 10/05." },
                { nome: "Maria Eduarda", obs: "Sábado às 20:00h e Domingo às 09:00h. Início 10/05." },
                { nome: "Deo Garcez", obs: "Domingo às 09:00h. Início 10/05." },
                { nome: "Marta", obs: "Domingo às 08:00h. Início 10/05." }
            ];

            // DADOS DA MENTORIA (ESPAÇO EM BRANCO)
            const alunosMentoria = ["Wilma Duarte", "Eli (mãe de Gael)", "Maurina", "Anikelly", "Scheila", "Samantha", "Izabel", "Sophia", "Maria Eduarda", "Deo Garcez", "Marta", "Alexandre pé de serra"];

            let corpoHtml = '<div class="dias-grid">';
            
            if (tipo === 'curso') {
                alunosIA.forEach(item => {
                    corpoHtml += `
                    <div class="dia-card">
                        <div class="info-row" style="font-size:1.1rem; color:#fff;"><strong>Aluno(a):</strong> ${item.nome}</div>
                        <div class="info-row"><strong>Observações:</strong> ${item.obs}</div>
                        <a href="#" target="_blank" class="btn-meet">Entrar na Sala do Meet</a>
                    </div>`;
                });
            } else {
                alunosMentoria.forEach(aluno => {
                    corpoHtml += `
                    <div class="dia-card">
                        <div class="info-row" style="font-size:1.1rem; color:#fff;"><strong>Aluno(a):</strong> ${aluno}</div>
                        <div class="info-row"><em>Espaço reservado para observações da mentoria...</em></div>
                        <a href="#" target="_blank" class="btn-meet">Abrir Sala do Meet</a>
                    </div>`;
                });
            }
            corpoHtml += '</div>';

            const htmlFinal = `
                <!DOCTYPE html>
                <html lang="pt-BR">
                <head>
                    <meta charset="UTF-8">
                    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
                    <title>${titulo}</title>
                    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
                    <style>
                        body { background-color: #050505; color: #f0f0f0; font-family: 'Inter', sans-serif; padding: 15px; margin: 0; display: flex; flex-direction: column; align-items: center; }
                        .ead-container { width: 100%; max-width: 500px; }
                        h1 { color: #00ffb3; font-size: 1.2rem; text-align: center; margin: 20px 0; text-transform: uppercase; letter-spacing: 1px; }
                        .dias-grid { display: flex; flex-direction: column; gap: 14px; }
                        .dia-card { background: #111; border: 1px solid #222; border-radius: 12px; padding: 20px; display: flex; flex-direction: column; gap: 10px; border-left: 4px solid #00ffb3; }
                        .info-row { font-size: 0.95rem; color: #888; line-height: 1.4; }
                        .info-row strong { color: #00ffb3; }
                        .btn-meet { background-color: #00ffb3; color: #000; text-decoration: none; padding: 12px; border-radius: 8px; font-weight: 700; text-align: center; margin-top: 10px; font-size: 0.9rem; text-transform: uppercase; }
                        footer { margin-top: 40px; padding: 20px; color: #444; font-size: 0.75rem; text-align: center; border-top: 1px solid #222; width: 100%; }
                    </style>
                </head>
                <body>
                    <div class="ead-container">
                        <h1>${titulo}</h1>
                        ${corpoHtml}
                        <footer>Copyright Plínio Studio</footer>
                    </div>
                </body>
                </html>`;

            janela.document.write(htmlFinal);
            janela.document.close();
        }
    </script>
</body>
</html>
